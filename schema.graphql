"""
Destination channel for an agent's report.
"""
enum AgentDeliveryChannel {
  email
  insights
  knowledge
  slack
}

"""
Channel-specific delivery configuration. Resolve to one of the concrete types.
"""
interface AgentDeliveryConfig {
  channel: AgentDeliveryChannel
}

"""
Discriminated delivery config. Exactly one of the four channel sub-inputs must be provided; the resolver enforces this.
"""
input AgentDeliveryConfigInput {
  email: EmailDeliveryConfigInput
  insights: InsightsDeliveryConfigInput
  knowledge: KnowledgeDeliveryConfigInput
  slack: SlackDeliveryConfigInput
}

"""
Attaches a delivery to a `generate_report` action. The parent agent is derived from the action (the resource layer enforces the action-type check).
"""
input AgentDeliveryCreateInput {
  actionId: String!
  channel: AgentDeliveryChannel!
  config: AgentDeliveryConfigInput!
}

"""
Channel-level pause/error status, independent of the parent agent.
"""
enum AgentDeliveryStatus {
  active
  error
  paused
}

input AgentDeliveryUpdateInput {
  config: AgentDeliveryConfigInput
  status: AgentDeliveryStatus
}

