"""
What fires an agent run — a schedule or an event subscription.
"""
type AgentTrigger {
  agentId: String
  cadence: AgentCadence
  createdAt: DateTime
  health: String!
  id: String
  integrationId: String
  integrationNotionPageId: String
  integrationProvider: String
  integrationRepoFullName: String
  integrationSlackChannelId: String
  integrationSourceLabel: String
  integrationTriggerType: String
  lastFiredAt: DateTime
  lastRunAt: DateTime
  nextRunAt: DateTime
  squadEvent: String
  squadEventDirectoryId: String
  squadEventDocumentId: String
  squadEventMinScore: Float
  startAt: DateTime
  status: AgentTriggerStatus
  type: AgentTriggerType
  updatedAt: DateTime
}

"""
Discriminated trigger config. Provide exactly one sub-input matching `type`: `schedule`, `squadEvent`, or `integrationEvent`.
"""
input AgentTriggerConfigInput {
  integrationEvent: IntegrationEventTriggerConfigInput
  schedule: ScheduleTriggerConfigInput
  squadEvent: SquadEventTriggerConfigInput
}

input AgentTriggerCreateInput {
  agentId: String!
  config: AgentTriggerConfigInput!
  type: AgentTriggerType!
}

"""
A trigger to create alongside a new agent (no `agentId` — the agent is being created). One per schedule/event the agent should fire on.
"""
input AgentTriggerInput {
  config: AgentTriggerConfigInput!
  type: AgentTriggerType!
}

"""
Per-trigger status, independent of the parent agent. `error` = dead (e.g. its integration disconnected).
"""
enum AgentTriggerStatus {
  active
  error
  paused
}

"""
What fires an agent run. `schedule` runs on a cadence; `squad_event` / `integration_event` fire when a matching event occurs. `agent_event` (chaining) is reserved — present for forward-compat but not creatable in v1.
"""
enum AgentTriggerType {
  agent_event
  integration_event
  schedule
  squad_event
}

"""
Update a trigger's config and/or status. Trigger `type` is immutable.
"""
input AgentTriggerUpdateInput {
  config: AgentTriggerConfigInput
  status: AgentTriggerStatus
}

"""
What kind of ingestion this agent performs. `url` fetches a fixed URL each run; `research` hands a free-text brief to an agent that decides whether to web-search, query internal data, or both.
"""
enum AgentType {
  research
  url
}

