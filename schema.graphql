type Agent {
  """
  The action set this agent runs on each tick. Empty list only if the agent is mid-edit; the resource layer rejects creates with zero actions.
  """
  actions: [AgentAction!]
  activeAgentInvocations: [AgentInvocation!]
  cadence: AgentCadence
  createdAt: DateTime
  createdByUserId: String
  creationNote: String
  dedupKey: String
  deliveries: [AgentDelivery!]
  id: String

  """
  The standing brief — what the agent does with its sources each run. Nullable only through the agent-sources cutover window.
  """
  instructions: String
  lastRunAt: DateTime
  latestReport: Report
  latestRun: AgentRun
  name: String
  nextRunAt: DateTime
  reports(limit: Int = 20, offset: Int = 0): [Report!]
  researchConfig: ResearchAgentConfig
  runs(limit: Int = 20): [AgentRun!]

  """
  Where the agent looks for information each run (directed reading).
  """
  sources: [AgentSource!]
  startAt: DateTime
  status: AgentStatus
  triggers: [AgentTrigger!]
  type: AgentType
  updatedAt: DateTime
  urlConfig: UrlAgentConfig
}

"""
A single behaviour an agent performs on each run. Agents fan out to all of their actions in parallel; `position` is reserved for ordered execution and ignored today.
"""
type AgentAction {
  agentId: String
  config: AgentActionConfig
  createdAt: DateTime
  id: String
  position: Int
  type: AgentActionType
  updatedAt: DateTime
}

"""
Type-specific action configuration. Resolve to one of the concrete types matching the parent action's `type`.
"""
interface AgentActionConfig {
  type: AgentActionType
}

"""
Discriminated action input. Exactly one of `extractSignals`, `groomKnowledge`, or `generateReport` must be provided; the resolver enforces this. `extractSignals` and `groomKnowledge` carry no config — pass `true` to include them.
"""
input AgentActionInput {
  extractSignals: Boolean
  generateReport: GenerateReportActionConfigInput
  groomKnowledge: Boolean
  position: Int
}

"""
What an action does when its parent agent runs. `extract_signals` fans out the signal-extraction pipeline; `groom_knowledge` rebuilds/extends knowledge documents; `generate_report` produces a report (and routes through child deliveries).
"""
enum AgentActionType {
  extract_signals
  generate_report
  groom_knowledge
}

input AgentActionUpdateInput {
  config: AgentActionInput
  position: Int
}

"""
Schedule cadence for an agent.
"""
enum AgentCadence {
  annually
  daily
  hourly
  monthly
  quarterly
  weekly
}

"""
Discriminated agent config. Provide exactly one of `url` or `research` matching the parent `type`.
"""
input AgentConfigInput {
  research: ResearchAgentConfigInput
  url: UrlAgentConfigInput
}

input AgentCreateInput {
  """
  Must contain at least one action.
  """
  actions: [AgentActionInput!]!

  """
  Legacy convenience: when `triggers` is omitted, a single schedule trigger is created from this cadence. Ignored when `triggers` is provided.
  """
  cadence: AgentCadence
  config: AgentConfigInput
  creationNote: String

  """
  The standing brief — required when `type`/`config` are omitted (the unified model).
  """
  instructions: String
  name: String!

  """
  Sources created with the agent — where it looks for information each run.
  """
  sources: [AgentSourceConfigInput!]
  startAt: DateTime

  """
  Triggers that fire this agent. When provided it must be non-empty and replaces `cadence` (a schedule is just one trigger type). When omitted, a single schedule trigger is created from `cadence` (defaults to weekly).
  """
  triggers: [AgentTriggerInput!]

  """
  Legacy shape (with `config`). Omit both and provide `instructions` (+ optional `sources`) instead — the unified model derives the legacy columns during the cutover window.
  """
  type: AgentType
}

type AgentDelivery {
  actionId: String
  channel: AgentDeliveryChannel
