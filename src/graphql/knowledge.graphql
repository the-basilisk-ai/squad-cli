query CliDocumentList($limit: Int, $offset: Int) {
  documentList(limit: $limit, offset: $offset) {
    id
    displayId
    title
    kind
    path
    tags
    updatedAt
    onePagerStatus
    onePagerType
  }
}

query CliOnePagerList(
  $filters: OnePagerListFilters
  $limit: Int
  $offset: Int
) {
  onePagerList(filters: $filters, limit: $limit, offset: $offset) {
    id
    displayId
    title
    onePagerStatus
    onePagerType
    decisionRecommendation
    updatedAt
    sourceInsight {
      id
      displayId
      title
    }
    sourceAction {
      id
      displayId
      title
    }
  }
}

mutation CliCreateDocument($input: CreateDocumentInput!) {
  createDocument(input: $input) {
    id
    displayId
    title
    path
  }
}

mutation CliUpdateDocument($id: String!, $input: UpdateDocumentInput!) {
  updateDocument(id: $id, input: $input) {
    id
    displayId
    title
    updatedAt
  }
}

mutation CliAddDocumentTag($id: String!, $tag: String!) {
  addDocumentTag(id: $id, tag: $tag) {
    id
    tags
  }
}

mutation CliRemoveDocumentTag($id: String!, $tag: String!) {
  removeDocumentTag(id: $id, tag: $tag) {
    id
    tags
  }
}

mutation CliGenerateOnePagerFromAction(
  $actionId: String!
  $type: OnePagerType
) {
  generateOnePagerFromAction(actionId: $actionId, type: $type) {
    onePagerId
    onePagerDisplayId
  }
}

mutation CliGenerateOnePagerFromInsight(
  $insightId: String!
  $type: OnePagerType
) {
  generateOnePagerFromInsight(insightId: $insightId, type: $type) {
    id
    displayId
    title
    onePagerStatus
  }
}

mutation CliRetryOnePagerGeneration($onePagerId: String!) {
  retryOnePagerGeneration(onePagerId: $onePagerId) {
    id
    displayId
    onePagerStatus
  }
}

mutation CliSetOnePagerStatus($onePagerId: String!, $status: OnePagerStatus!) {
  setOnePagerStatus(onePagerId: $onePagerId, status: $status) {
    id
    displayId
    title
    onePagerStatus
  }
}
