query CliCommandSearch($search: String!, $limitPerType: Int) {
  commandSearchEntities(search: $search, limitPerType: $limitPerType) {
    id
    displayId
    title
    type
  }
}

query CliDocumentTextSearch($search: String, $limit: Int) {
  documentSearch(search: $search, limit: $limit) {
    id
    displayId
    title
    kind
    updatedAt
  }
}
